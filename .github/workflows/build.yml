name: Build HarryWrt (OpenWrt 24.10.5 Clean x86_64)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. v1.0)"
        required: true
        default: "v1.0"
      ssh_debug:
        description: "Enable SSH debug session (tmate)"
        required: false
        default: "false"
  push:
    tags:
      - "clean-24.10.5-v*"

permissions:
  contents: write

env:
  OWRT_TAG: "v24.10.5"
  OWRT_REPO: "https://github.com/openwrt/openwrt.git"
  OWRT_BASE: "24.10.5"
  PROFILE: "clean"
  TARGET: "x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            rel="${{ github.event.inputs.release_version }}"
          else
            tag="${GITHUB_REF##*/}"
            rel="$(echo "$tag" | grep -oE 'v[0-9]+(\.[0-9]+){0,2}' || true)"
            [[ -n "$rel" ]] || rel="v1.0"
          fi
          echo "release=$rel" >> "$GITHUB_OUTPUT"
          echo "Release: $rel"

      - name: Free disk space and enable swap
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /usr/share/swift /usr/local/share/boost || true
          sudo apt-get clean || true
          df -h

          SWAP_PATH="/mnt/gh-swapfile"
          sudo swapoff "$SWAP_PATH" 2>/dev/null || true
          sudo rm -f "$SWAP_PATH" || true

          if ! sudo fallocate -l 8G "$SWAP_PATH" 2>/dev/null; then
            sudo dd if=/dev/zero of="$SWAP_PATH" bs=1M count=8192 status=progress
          fi

          sudo chmod 600 "$SWAP_PATH"
          sudo mkswap "$SWAP_PATH"
          sudo swapon "$SWAP_PATH"
          sudo swapon --show || true
          free -h || true

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev \
            file wget curl ca-certificates time \
            python3 python3-distutils python3-setuptools python3-pyelftools \
            gperf swig subversion mercurial \
            ccache
          git --version
          python3 --version
          ccache --version | head -n 1

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.OWRT_TAG }}-${{ env.TARGET }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ env.OWRT_TAG }}-${{ env.TARGET }}-
            ccache-${{ env.OWRT_TAG }}-

      - name: Clone OpenWrt source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 --branch "${OWRT_TAG}" "${OWRT_REPO}" openwrt
          : > openwrt/build.log

      - name: Add Passwall packages feed
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default

      - name: Add extra packages (Argon theme sources)
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          mkdir -p package/extra
          rm -rf package/extra/luci-theme-argon || true
          git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon.git \
            package/extra/luci-theme-argon 2>&1 | tee -a build.log

      - name: Update and install feeds
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          ./scripts/feeds update -a 2>&1 | tee -a build.log
          ./scripts/feeds install -a -f 2>&1 | tee -a build.log

      - name: Apply config and run DIY
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt

          cp "${GITHUB_WORKSPACE}/configs/x86_64-clean.config" .config

          # Enable ccache for the build
          echo "CONFIG_CCACHE=y" >> .config

          chmod +x "${GITHUB_WORKSPACE}/scripts/diy.sh"
          bash "${GITHUB_WORKSPACE}/scripts/diy.sh" 2>&1 | tee -a build.log

          make defconfig 2>&1 | tee -a build.log

          echo "Checking important packages in final .config..." | tee -a build.log

          MUST_Y=(
            "CONFIG_PACKAGE_dnsmasq-full"
            "CONFIG_PACKAGE_iptables-nft"
            "CONFIG_PACKAGE_kmod-nft-tproxy"
            "CONFIG_PACKAGE_kmod-nft-socket"
            "CONFIG_PACKAGE_kmod-nft-compat"
            "CONFIG_PACKAGE_kmod-tun"
            "CONFIG_PACKAGE_libev"
            "CONFIG_PACKAGE_libsodium"
            "CONFIG_PACKAGE_libudns"
            "CONFIG_PACKAGE_kmod-inet-diag"
            "CONFIG_PACKAGE_kmod-netlink-diag"
            "CONFIG_PACKAGE_coreutils"
            "CONFIG_PACKAGE_coreutils-base64"
            "CONFIG_PACKAGE_coreutils-nohup"
            "CONFIG_PACKAGE_libuci-lua"
            "CONFIG_PACKAGE_tcping"
            "CONFIG_PACKAGE_geoview"
            "CONFIG_PACKAGE_v2ray-geoip"
            "CONFIG_PACKAGE_v2ray-geosite"
            "CONFIG_PACKAGE_xray-core"
            "CONFIG_PACKAGE_sing-box"
          )

          OPTIONAL_Y=(
            "CONFIG_PACKAGE_luci-theme-argon"
          )

          missing=0
          for k in "${MUST_Y[@]}"; do
            if grep -qE "^${k}=y$" .config; then
              echo "OK: ${k}=y" | tee -a build.log
            else
              echo "MISSING: ${k}=y" | tee -a build.log
              missing=1
            fi
          done

          for k in "${OPTIONAL_Y[@]}"; do
            if grep -qE "^${k}=y$" .config; then
              echo "OK: ${k}=y (optional)" | tee -a build.log
            else
              echo "NOTE: ${k} is not enabled (optional)" | tee -a build.log
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "ERROR: One or more required packages are not enabled in final .config." | tee -a build.log
            exit 1
          fi

      - name: Download sources
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          make download -j"$(nproc)" 2>&1 | tee -a build.log

      - name: SSH debug session (on demand)
        if: github.event.inputs.ssh_debug == 'true'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          timeout-minutes: 30

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          BUILD_START=$(date +%s)
          echo "Build started at: $(date -u)" | tee -a build.log
          make -j"$(nproc)" 2>&1 | tee -a build.log || {
            echo "Parallel build failed, retrying with single thread (verbose)..." | tee -a build.log
            make -j1 V=s 2>&1 | tee -a build.log
          }
          BUILD_END=$(date +%s)
          BUILD_MIN=$(( (BUILD_END - BUILD_START) / 60 ))
          BUILD_SEC=$(( (BUILD_END - BUILD_START) % 60 ))
          echo "Build finished at: $(date -u)" | tee -a build.log
          echo "Total build time: ${BUILD_MIN}m ${BUILD_SEC}s" | tee -a build.log

      - name: Organize and rename files (HarryWrt naming)
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt/bin/targets/x86/64

          REL="${{ steps.meta.outputs.release }}"
          PREFIX="HarryWrt-${{ env.OWRT_BASE }}-${{ env.PROFILE }}-${REL}-${{ env.TARGET }}"

          # Verify each image exists before proceeding
          for pattern in \
            "*squashfs-combined.img.gz" \
            "*squashfs-combined-efi.img.gz" \
            "*ext4-combined.img.gz" \
            "*ext4-combined-efi.img.gz"
          do
            count=$(ls -1 $pattern 2>/dev/null | wc -l)
            if [[ "$count" -eq 0 ]]; then
              echo "ERROR: No file matching '${pattern}' found in $(pwd)" >&2
              ls -lah . >&2
              exit 1
            fi
          done

          BIOS_SQ="$(ls -1 *squashfs-combined.img.gz | head -n 1)"
          UEFI_SQ="$(ls -1 *squashfs-combined-efi.img.gz | head -n 1)"
          BIOS_E4="$(ls -1 *ext4-combined.img.gz | head -n 1)"
          UEFI_E4="$(ls -1 *ext4-combined-efi.img.gz | head -n 1)"

          cp -f "$BIOS_SQ" "${PREFIX}-squashfs-bios.img.gz"
          cp -f "$UEFI_SQ" "${PREFIX}-squashfs-uefi.img.gz"
          cp -f "$BIOS_E4" "${PREFIX}-ext4-bios.img.gz"
          cp -f "$UEFI_E4" "${PREFIX}-ext4-uefi.img.gz"

          sha256sum ${PREFIX}-*.img.gz > SHA256SUMS

          echo "Output files:"
          ls -lah ${PREFIX}-*.img.gz SHA256SUMS

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Log-clean-${{ steps.meta.outputs.release }}
          path: openwrt/build.log

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HarryWrt-${{ env.OWRT_BASE }}-${{ env.PROFILE }}-${{ steps.meta.outputs.release }}-${{ env.TARGET }}
          path: |
            openwrt/bin/targets/x86/64/HarryWrt-${{ env.OWRT_BASE }}-${{ env.PROFILE }}-${{ steps.meta.outputs.release }}-${{ env.TARGET }}-*.img.gz
            openwrt/bin/targets/x86/64/SHA256SUMS

      - name: Publish GitHub Release (gh cli, tag builds only)
        if: startsWith(github.ref, 'refs/tags/') && success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF##*/}"
          REL="${{ steps.meta.outputs.release }}"

          cd openwrt/bin/targets/x86/64

          PREFIX="HarryWrt-${{ env.OWRT_BASE }}-${{ env.PROFILE }}-${REL}-${{ env.TARGET }}"

          # Copy build log to release directory (build.log is 4 levels up from here)
          LOG_PATH="$(cd ../../../../ && pwd)/build.log"
          if [ -f "$LOG_PATH" ]; then
            cp -f "$LOG_PATH" ./build.log
          else
            echo "(build log not found)" > ./build.log
          fi

          printf '%s\n' \
            "Base: OpenWrt 24.10.5 (x86_64)" \
            "Profile: Clean Edition" \
            "" \
            "Notes:" \
            "- Argon theme is included but the default UI remains Bootstrap." \
            "- This build is offline-ready for third-party packages." \
            "- IPv6 support included (odhcp6c + odhcpd)." \
            "" \
            "Recommended:" \
            "- squashfs-uefi for UEFI systems" \
            "- squashfs-bios for legacy BIOS systems" \
            "" \
            "Default:" \
            "- Hostname: HarryWrt" \
            "- Timezone: Asia/Hong_Kong" \
            "" \
            "Integrity:" \
            "- SHA256SUMS included" \
            > release_notes.txt

          ASSETS=(
            "${PREFIX}-squashfs-bios.img.gz"
            "${PREFIX}-squashfs-uefi.img.gz"
            "${PREFIX}-ext4-bios.img.gz"
            "${PREFIX}-ext4-uefi.img.gz"
            "SHA256SUMS"
          )

          echo "Checking for existing release: ${TAG} (repo: ${REPO})"
          if ! gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "Creating new release: ${TAG}"
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --title "HarryWrt Clean 24.10.5 ${REL} - x86_64" \
              --notes-file release_notes.txt
          fi

          echo "Uploading assets..."
          for f in "${ASSETS[@]}"; do
            if [ -f "$f" ]; then
              echo "Uploading: $f"
              gh release upload "${TAG}" "$f" --repo "${REPO}" --clobber
            else
              echo "WARNING: Missing asset (skipping): $f" >&2
            fi
          done
